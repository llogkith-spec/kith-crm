<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KITH Cars — Accounts</title>
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#161616;--surface3:#1c1c1c;
  --border:#222;--border2:#2a2a2a;--text:#f0f0f0;--dim:#888;--faint:#444;
  --gold:#c9a84c;--gold-dim:#8a6d2a;--green:#4caf78;--red:#d94f4f;
  --amber:#e08c3a;--blue:#4a90d9;--purple:#9b6dd9;
  --green-bg:rgba(76,175,120,.1);--red-bg:rgba(217,79,79,.1);
  --amber-bg:rgba(224,140,58,.1);--blue-bg:rgba(74,144,217,.1);
  --rs:8px;--rs2:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-size:16px;font-weight:900;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.brand-sub{color:var(--gold);font-size:13px;font-weight:600}
.tabs{display:flex;gap:4px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--dim);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.main{padding:16px;max-width:1200px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs2);padding:16px;margin-bottom:14px}
.stitle{font-size:11px;font-weight:800;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:14px}
.stat-val{font-size:28px;font-weight:900;line-height:1}
.stat-lbl{font-size:11px;color:var(--dim);margin-top:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--rs);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-gold{background:var(--gold);color:#000}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.btn-red{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#000}
.btn-blue{background:var(--blue);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-full{width:100%}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:var(--faint);font-weight:700;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.b-paid{background:var(--green-bg);color:var(--green)}
.b-unpaid{background:var(--red-bg);color:var(--red)}
.b-partial{background:var(--amber-bg);color:var(--amber)}
.b-matched{background:var(--green-bg);color:var(--green)}
.b-unmatched{background:var(--red-bg);color:var(--red)}
.b-pending{background:var(--amber-bg);color:var(--amber)}
.notice{padding:10px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:10px}
.n-blue{background:var(--blue-bg);border:1px solid rgba(74,144,217,.2);color:var(--blue)}
.n-red{background:var(--red-bg);border:1px solid rgba(217,79,79,.2);color:var(--red)}
.n-green{background:var(--green-bg);border:1px solid rgba(76,175,120,.2);color:var(--green)}
.n-amber{background:var(--amber-bg);border:1px solid rgba(224,140,58,.2);color:var(--amber)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs2);width:100%;max-height:90vh;overflow-y:auto}
.ph{display:flex;justify-content:space-between;align-items:flex-start;padding:16px;border-bottom:1px solid var(--border)}
.pb{padding:16px;display:flex;flex-direction:column;gap:12px}
.preg{font-size:18px;font-weight:900;font-family:'Courier New',monospace;color:var(--gold)}
.psub{font-size:12px;color:var(--dim);margin-top:2px}
.xbtn{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px}
.fi{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;color:var(--text);font-size:13px;width:100%}
.fsel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;color:var(--text);font-size:13px;width:100%}
.flbl{font-size:11px;color:var(--dim);margin-bottom:4px;font-weight:600}
.fg{display:flex;flex-direction:column;gap:4px}
/* Upload zone */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--rs2);padding:32px;text-align:center;cursor:pointer;transition:border-color .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--gold)}
.upload-zone input{display:none}
/* AI result */
.ai-result{background:var(--surface2);border:1px solid var(--gold-dim);border-radius:var(--rs);padding:14px;margin-top:10px}
.match-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
/* Login */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs2);padding:32px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);transition:background .15s;display:inline-block}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:20px;font-weight:700;padding:14px;cursor:pointer}
.pin-btn:active{background:var(--gold);color:#000}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div style="font-size:24px;font-weight:900">🚗 KITH Cars — Accounts</div>
  <div style="font-size:13px;color:var(--dim)">Authorised access only</div>
  <div class="login-card">
    <div id="login-name-step">
      <div class="stitle" style="margin-bottom:12px">Select User</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-ghost btn-full" onclick="acctStartPin('Sudha')">Sudha — Accounts</button>
        <button class="btn btn-ghost btn-full" onclick="acctStartPin('Logkith')">Logkith — Director</button>
      </div>
    </div>
    <div id="login-pin-step" style="display:none;flex-direction:column;align-items:center;gap:10px">
      <div id="pin-who" style="font-size:15px;font-weight:700"></div>
      <div style="display:flex;gap:10px;margin:4px 0">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
      </div>
      <div id="pin-err" style="font-size:12px;color:var(--red);min-height:16px"></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:200px">
        <button class="pin-btn" onclick="acctPin('1')">1</button>
        <button class="pin-btn" onclick="acctPin('2')">2</button>
        <button class="pin-btn" onclick="acctPin('3')">3</button>
        <button class="pin-btn" onclick="acctPin('4')">4</button>
        <button class="pin-btn" onclick="acctPin('5')">5</button>
        <button class="pin-btn" onclick="acctPin('6')">6</button>
        <button class="pin-btn" onclick="acctPin('7')">7</button>
        <button class="pin-btn" onclick="acctPin('8')">8</button>
        <button class="pin-btn" onclick="acctPin('9')">9</button>
        <button class="pin-btn" style="font-size:11px" onclick="acctPinClear()">Clear</button>
        <button class="pin-btn" onclick="acctPin('0')">0</button>
        <button class="pin-btn" onclick="acctPinBack()">⌫</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="acctPinCancel()">← Back</button>
    </div>
  </div>
</div>

<!-- MAIN APP (hidden until login) -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="brand">🚗 KITH Cars <span class="brand-sub">Accounts</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="acct-user" style="font-size:12px;color:var(--dim)"></span>
      <button class="btn btn-ghost btn-sm" onclick="acctLogout()">Log Out</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="acctTab('dash',this)">📊 Dashboard</button>
    <button class="tab" onclick="acctTab('pos',this)">📦 Purchase Orders</button>
    <button class="tab" onclick="acctTab('returns',this)">↩ Returns</button>
    <button class="tab" onclick="acctTab('bills',this)">🧾 Bill Scanner</button>
    <button class="tab" onclick="acctTab('invoices',this)">📄 Invoices</button>
  </div>
  <div class="main">
    <div id="v-dash"></div>
    <div id="v-pos" style="display:none"></div>
    <div id="v-returns" style="display:none"></div>
    <div id="v-bills" style="display:none"></div>
    <div id="v-invoices" style="display:none"></div>
  </div>
</div>

<!-- INVOICE OVERLAY -->
<div class="overlay" id="ov-invoice">
<div class="panel" style="max-width:600px">
  <div class="ph"><div><div class="preg">New Invoice</div><div class="psub">Manual invoice entry</div></div><button class="xbtn" onclick="cx('ov-invoice')">✕</button></div>
  <div class="pb">
    <div class="grid2">
      <div class="fg"><label class="flbl">Invoice #</label><input class="fi" id="inv-num" placeholder="INV-001"/></div>
      <div class="fg"><label class="flbl">Supplier</label><input class="fi" id="inv-supplier" placeholder="GSF Car Parts"/></div>
    </div>
    <div class="grid2">
      <div class="fg"><label class="flbl">Invoice Date</label><input class="fi" type="date" id="inv-date"/></div>
      <div class="fg"><label class="flbl">Due Date</label><input class="fi" type="date" id="inv-due"/></div>
    </div>
    <div class="grid2">
      <div class="fg"><label class="flbl">Amount ex-VAT (£)</label><input class="fi" type="number" id="inv-net" placeholder="0.00" step="0.01"/></div>
      <div class="fg"><label class="flbl">VAT (£)</label><input class="fi" type="number" id="inv-vat" placeholder="0.00" step="0.01" oninput="calcTotal()"/></div>
    </div>
    <div class="fg"><label class="flbl">Total inc-VAT (£)</label><input class="fi" id="inv-total" placeholder="0.00" readonly style="background:var(--surface3)"/></div>
    <div class="fg"><label class="flbl">Linked PO # (optional)</label><input class="fi" id="inv-po" placeholder="PO123456"/></div>
    <div class="fg"><label class="flbl">Notes</label><textarea class="fi" id="inv-notes" rows="3" placeholder="Any notes..."></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="cx('ov-invoice')">Cancel</button>
      <button class="btn btn-gold" onclick="saveInvoice()">Save Invoice</button>
    </div>
  </div>
</div>
</div>

<!-- BILL DETAIL OVERLAY -->
<div class="overlay" id="ov-bill">
<div class="panel" style="max-width:700px" id="bill-panel"></div>
</div>

<script>
// ── SUPABASE CONFIG ──────────────────────────────────────
const SB_URL = 'https://mxyrxyhvjndgjqupgstu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14eXJ4eWh2am5kZ2pxdXBnc3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTMyNjgsImV4cCI6MjA5Nzc4OTI2OH0.z7F_sUqx56bIcBLxjWFJSP3rT1jhNPAL9_1SWZ7cUog';

async function sbGet(table){
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?select=*&order=updated_at.desc', {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  return r.json();
}
async function sbUpsert(table, row){
  await fetch(SB_URL+'/rest/v1/'+table, {
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify(row)
  });
}

// ── AUTH ─────────────────────────────────────────────────
const ACCT_PINS = {'Sudha':'6666','Logkith':'0000'};
let acctUser = null;
let pinWho = null;
let pinBuf = '';
const AUTO_LOGOUT = 20*60*1000;
let lastAct = Date.now();

document.addEventListener('click', ()=>lastAct=Date.now());
document.addEventListener('keydown', ()=>lastAct=Date.now());
setInterval(()=>{ if(acctUser && Date.now()-lastAct>=AUTO_LOGOUT){ alert('Logged out due to inactivity.'); acctLogout(); } }, 30000);

function acctStartPin(name){
  pinWho=name; pinBuf='';
  document.getElementById('pin-who').textContent='Hi '+name+' 👋';
  document.getElementById('pin-err').textContent='';
  document.getElementById('login-name-step').style.display='none';
  document.getElementById('login-pin-step').style.display='flex';
  updateDots();
}
function acctPin(d){
  if(pinBuf.length>=4)return;
  pinBuf+=d; updateDots();
  if(pinBuf.length===4) setTimeout(checkAcctPin,150);
}
function acctPinBack(){ pinBuf=pinBuf.slice(0,-1); updateDots(); }
function acctPinClear(){ pinBuf=''; updateDots(); }
function acctPinCancel(){
  pinBuf=''; pinWho=null;
  document.getElementById('login-pin-step').style.display='none';
  document.getElementById('login-name-step').style.display='block';
}
function updateDots(){
  for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled',i<pinBuf.length);
}
function checkAcctPin(){
  const expected = ACCT_PINS[pinWho]||'0000';
  if(pinBuf===expected){
    acctUser=pinWho;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('acct-user').textContent=acctUser;
    loadAll();
  } else {
    document.getElementById('pin-err').textContent='Incorrect PIN';
    pinBuf=''; updateDots();
  }
}
function acctLogout(){
  acctUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-pin-step').style.display='none';
  document.getElementById('login-name-step').style.display='block';
}

// ── DATA ─────────────────────────────────────────────────
let pos=[], returns=[], invoices=[], bills=[];

async function loadAll(){
  const [pRows,rRows] = await Promise.all([sbGet('kith_pos'),sbGet('kith_returns')]);
  pos = pRows.map(r=>r.data);
  returns = rRows.map(r=>r.data);
  invoices = JSON.parse(localStorage.getItem('kith_acct_invoices')||'[]');
  bills = JSON.parse(localStorage.getItem('kith_acct_bills')||'[]');
  renderDash();
}

function saveInvoicesLocal(){ localStorage.setItem('kith_acct_invoices',JSON.stringify(invoices)); }
function saveBillsLocal(){ localStorage.setItem('kith_acct_bills',JSON.stringify(bills)); }

// ── TABS ─────────────────────────────────────────────────
function acctTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  ['dash','pos','returns','bills','invoices'].forEach(v=>{
    document.getElementById('v-'+v).style.display = v===tab?'block':'none';
  });
  if(tab==='dash') renderDash();
  if(tab==='pos') renderPOs();
  if(tab==='returns') renderReturns();
  if(tab==='bills') renderBills();
  if(tab==='invoices') renderInvoices();
}

function cx(id){ document.getElementById(id).classList.remove('open'); }
function ts(){ return new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

// ── DASHBOARD ────────────────────────────────────────────
function renderDash(){
  const totalPO = pos.reduce((s,p)=>s+(+p.price||0),0);
  const paidPO = pos.filter(p=>p.paid).reduce((s,p)=>s+(+p.price||0),0);
  const unpaidPO = totalPO - paidPO;
  const unpaidCount = pos.filter(p=>!p.paid).length;
  const pendingReturns = returns.filter(r=>!r.creditReceived);
  const creditOwed = pendingReturns.reduce((s,r)=>s+(+r.price||0),0);
  const unmatchedBills = bills.filter(b=>b.matchStatus==='unmatched');
  const overdueInvoices = invoices.filter(i=>i.due&&new Date(i.due)<new Date()&&i.status!=='paid');

  document.getElementById('v-dash').innerHTML =
    '<div class="stitle" style="margin-bottom:12px">Accounts Overview</div>'+

    // Alert bar
    ((unmatchedBills.length||overdueInvoices.length||unpaidCount>5)?
      '<div class="notice n-red" style="margin-bottom:14px">'+
        (unmatchedBills.length?'⚠ '+unmatchedBills.length+' unmatched bill(s) need reviewing. ':'') +
        (overdueInvoices.length?'⚠ '+overdueInvoices.length+' overdue invoice(s). ':'') +
        (unpaidCount>5?'⚠ '+unpaidCount+' unpaid POs. ':'')+
      '</div>':'')+

    '<div class="grid4" style="margin-bottom:16px">'+
      statCard('Total PO Value','£'+totalPO.toFixed(2),'var(--gold)')+
      statCard('Paid','£'+paidPO.toFixed(2),'var(--green)')+
      statCard('Outstanding','£'+unpaidPO.toFixed(2),'var(--red)')+
      statCard('Credits Owed','£'+creditOwed.toFixed(2),'var(--amber)')+
    '</div>'+

    '<div class="grid2">'+
      // Unpaid POs
      '<div class="card">'+
        '<div class="stitle">Unpaid Purchase Orders ('+unpaidCount+')</div>'+
        (pos.filter(p=>!p.paid).length?
          '<table><thead><tr><th>PO #</th><th>Part</th><th>Supplier</th><th>Amount</th><th>Job</th></tr></thead><tbody>'+
          pos.filter(p=>!p.paid).slice(0,10).map(p=>
            '<tr><td style="font-family:\'Courier New\',monospace;color:var(--gold);font-weight:700">'+p.id+'</td>'+
            '<td>'+p.partName+'</td><td style="color:var(--dim)">'+p.supplier+'</td>'+
            '<td style="font-weight:700">£'+(+p.price).toFixed(2)+'</td>'+
            '<td style="font-family:\'Courier New\',monospace;color:var(--gold);font-size:11px">'+p.jobReg+'</td></tr>'
          ).join('')+'</tbody></table>'+
          (unpaidCount>10?'<div style="font-size:12px;color:var(--dim);margin-top:8px">+ '+(unpaidCount-10)+' more — see POs tab</div>':''):
          '<div class="notice n-green">✓ All POs paid</div>'
        )+
      '</div>'+

      // Pending credits
      '<div class="card">'+
        '<div class="stitle">Pending Return Credits ('+pendingReturns.length+')</div>'+
        (pendingReturns.length?
          '<table><thead><tr><th>RO #</th><th>Part</th><th>Supplier</th><th>Credit Due</th></tr></thead><tbody>'+
          pendingReturns.slice(0,8).map(r=>
            '<tr><td style="font-family:\'Courier New\',monospace;color:var(--gold);font-weight:700">'+r.id+'</td>'+
            '<td>'+r.partName+'</td><td style="color:var(--dim)">'+r.supplier+'</td>'+
            '<td style="font-weight:700;color:var(--amber)">£'+(+r.price).toFixed(2)+'</td></tr>'
          ).join('')+'</tbody></table>':
          '<div class="notice n-green">✓ No pending credits</div>'
        )+
      '</div>'+
    '</div>'+

    // Unmatched bills
    (unmatchedBills.length?
      '<div class="card" style="margin-top:14px">'+
        '<div class="stitle">Unmatched Bills ('+unmatchedBills.length+') — Need Review</div>'+
        '<table><thead><tr><th>Date</th><th>Supplier (from bill)</th><th>Amount</th><th>Status</th><th></th></tr></thead><tbody>'+
        unmatchedBills.map(b=>
          '<tr><td style="color:var(--dim)">'+b.scannedAt+'</td>'+
          '<td>'+b.supplier+'</td>'+
          '<td style="font-weight:700">£'+b.amount+'</td>'+
          '<td><span class="badge b-unmatched">Unmatched</span></td>'+
          '<td><button class="btn btn-ghost btn-sm" onclick="openBill(\''+b.id+'\')">Review</button></td></tr>'
        ).join('')+'</tbody></table>'+
      '</div>':'');
}

function statCard(lbl,val,color){
  return '<div class="stat-card"><div class="stat-val" style="color:'+color+'">'+val+'</div><div class="stat-lbl">'+lbl+'</div></div>';
}

// ── PURCHASE ORDERS ──────────────────────────────────────
function renderPOs(){
  const filter = document.getElementById('po-filter')?.value||'all';
  let filtered = pos;
  if(filter==='unpaid') filtered=pos.filter(p=>!p.paid);
  if(filter==='paid') filtered=pos.filter(p=>p.paid);
  if(filter==='onhold') filtered=pos.filter(p=>p.onHold);

  document.getElementById('v-pos').innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">'+
      '<div class="stitle">Purchase Orders ('+pos.length+' total)</div>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
        '<select class="fsel" id="po-filter" style="width:auto;font-size:12px" onchange="renderPOs()">'+
          '<option value="all">All POs</option>'+
          '<option value="unpaid">Unpaid Only</option>'+
          '<option value="paid">Paid Only</option>'+
          '<option value="onhold">On Hold</option>'+
        '</select>'+

    '<table><thead><tr>'+

        '<td>'+(p.surcharge?'<span style="font-size:11px;color:var(--amber)">↩ '+(p.oldUnitReturned?'Returned':'Pending')+'</span>':'—')+'</td>'+
        '<td style="font-size:11px;color:var(--dim);max-width:140px">'+(p.notes||'—').slice(0,60)+'</td>'+

    }).join('') : '<tr><td colspan="12" style="text-align:center;color:var(--faint);padding:20px">No purchase orders found</td></tr>')+
    '</tbody></table></div>'+
    '<div style="margin-top:10px;font-size:12px;color:var(--dim)">'+

      'VAT (20%): <strong>£'+(filtered.reduce((s,p)=>s+(+p.price||0),0)*0.2).toFixed(2)+'</strong> · '+
      'Total inc-VAT: <strong style="color:var(--gold)">£'+(filtered.reduce((s,p)=>s+(+p.price||0),0)*1.2).toFixed(2)+'</strong>'+
    '</div>';
}

async function markPaid(poId){
  const po = pos.find(p=>p.id===poId);
  if(!po) return;
  po.paid=true; po.paidBy=acctUser; po.paidAt=ts();
  await sbUpsert('kith_pos',{id:po.id,data:po,updated_at:new Date().toISOString()});
  renderPOs();
  renderDash();
}

function exportPOs(){
  const headers=['PO#','Job Reg','Part','Part No','Supplier','Price ex-VAT','VAT','Total inc-VAT','Paid','On Hold','Surcharge','Old Unit Returned','Notes'];
  const rows=pos.map(p=>{
    const net=+p.price||0;
    return[p.id,p.jobReg,p.partName,p.partNum||'',p.supplier,net.toFixed(2),(net*.2).toFixed(2),(net*1.2).toFixed(2),p.paid?'Yes':'No',p.onHold?'Yes':'No',p.surcharge?'Yes':'No',p.oldUnitReturned?'Yes':'No',p.notes||''];
  });
  const csv=[headers,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='KITH-POs-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);
}

// ── BILL SCANNER ─────────────────────────────────────────
function renderBills(){
  document.getElementById('v-bills').innerHTML =
    '<div class="stitle" style="margin-bottom:12px">Bill Scanner — Upload &amp; Match Against POs</div>'+
    '<div class="notice n-blue" style="margin-bottom:14px">Upload a photo or PDF of a supplier bill. Claude will read it and automatically try to match it against your purchase orders. All prices are ex-VAT in the CRM — VAT is calculated at 20%.</div>'+

    // Upload zone
    '<div class="card">'+
      '<div class="upload-zone" id="upload-zone" onclick="document.getElementById(\'bill-input\').click()" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="handleDrop(event)">'+
        '<input type="file" id="bill-input" accept="image/*,.pdf" onchange="scanBill(this.files[0])"/>'+
        '<div style="font-size:32px;margin-bottom:8px">📄</div>'+
        '<div style="font-size:15px;font-weight:700;margin-bottom:4px">Drop bill here or tap to upload</div>'+
        '<div style="font-size:12px;color:var(--dim)">Supports photos (JPG, PNG) and PDF</div>'+

      '<table><thead><tr><th>Scanned</th><th>Supplier</th><th>Invoice #</th><th>Amount</th><th>Match Status</th><th>Matched PO</th><th></th></tr></thead><tbody>'+
      bills.map(b=>
        '<tr>'+
          '<td style="font-size:11px;color:var(--dim)">'+b.scannedAt+'</td>'+
          '<td style="font-weight:600">'+b.supplier+'</td>'+
          '<td style="font-family:\'Courier New\',monospace;font-size:12px">'+( b.invoiceNum||'—')+'</td>'+
          '<td style="font-family:\'Courier New\',monospace;font-weight:700">£'+b.amount+'</td>'+
          '<td><span class="badge '+(b.matchStatus==='matched'?'b-matched':b.matchStatus==='partial'?'b-partial':'b-unmatched')+'">'+b.matchStatus+'</span></td>'+

function handleDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if(file) scanBill(file);
}

async function scanBill(file){
  if(!file) return;
  const statusEl = document.getElementById('scan-status');
  statusEl.innerHTML = '<div class="notice n-blue">⏳ Reading bill with Claude AI... please wait</div>';

  try{
    // Convert to base64
    const base64 = await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=()=>rej(new Error('Read failed'));
      r.readAsDataURL(file);
    });

    const isImage = file.type.startsWith('image/');
    const isPDF = file.type==='application/pdf';

    // Build message content
    const content = [];
    if(isImage){
      content.push({type:'image',source:{type:'base64',media_type:file.type,data:base64}});
    } else if(isPDF){
      content.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}});
    }

    // PO list for matching
    const poSummary = pos.slice(0,30).map(p=>'PO '+p.id+': '+p.partName+' from '+p.supplier+' £'+(+p.price).toFixed(2)+' (Job: '+p.jobReg+')').join('\n');

    content.push({type:'text',text:`You are reading a supplier invoice/bill for KITH Cars Group, an automotive repair centre.

Extract the following from this bill and respond ONLY in JSON with no markdown:
{
  "supplier": "supplier name",
  "invoiceNum": "invoice or reference number",
  "invoiceDate": "date on the invoice",
  "lineItems": [{"description":"part or service","qty":1,"unitPrice":"ex-VAT price","lineTotal":"ex-VAT total"}],
  "subtotal": "total ex-VAT",
  "vat": "VAT amount",
  "total": "total inc-VAT",
  "paymentTerms": "payment terms if shown",
  "notes": "any other relevant info"
}

Our POs for matching:
${poSummary}

After extracting, also add to the JSON:
"matchedPO": "best matching PO ID or null",
"matchConfidence": "high/medium/low/none",
"matchReason": "brief explanation of why you matched or didn't"

All prices in CRM are ex-VAT. Do not add VAT when comparing.`});

    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content}]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);

    const bill = {
      id:'BILL'+Date.now(),
      scannedAt:ts(),
      supplier:parsed.supplier||'Unknown',
      invoiceNum:parsed.invoiceNum||'',
      invoiceDate:parsed.invoiceDate||'',
      amount:parsed.subtotal||parsed.total||'?',
      vat:parsed.vat||'',
      total:parsed.total||'',
      lineItems:parsed.lineItems||[],
      matchedPO:parsed.matchedPO||null,
      matchStatus:parsed.matchConfidence==='high'?'matched':parsed.matchConfidence==='medium'?'partial':'unmatched',
      matchReason:parsed.matchReason||'',
      paymentTerms:parsed.paymentTerms||'',
      notes:parsed.notes||'',
      raw:parsed
    };

    bills.unshift(bill);
    saveBillsLocal();

    statusEl.innerHTML =
      '<div class="ai-result">'+
        '<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px">✓ Bill read successfully</div>'+
        '<div class="grid2" style="margin-bottom:10px">'+
          '<div><div class="flbl">Supplier</div><div style="font-weight:600">'+bill.supplier+'</div></div>'+
          '<div><div class="flbl">Invoice #</div><div style="font-family:monospace">'+( bill.invoiceNum||'—')+'</div></div>'+
          '<div><div class="flbl">Amount ex-VAT</div><div style="font-weight:700;color:var(--gold)">£'+bill.amount+'</div></div>'+
          '<div><div class="flbl">Total inc-VAT</div><div style="font-weight:700">£'+( bill.total||'—')+'</div></div>'+
        '</div>'+
        (bill.matchedPO?
          '<div class="notice n-'+(bill.matchStatus==='matched'?'green':'amber')+'">'+
            (bill.matchStatus==='matched'?'✓ Matched to ':'⚠ Possible match: ')+bill.matchedPO+' — '+bill.matchReason+
          '</div>':
          '<div class="notice n-red">✕ No PO match found — '+bill.matchReason+'</div>'
        )+
        '<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="openBill(\''+bill.id+'\')">Review Full Bill</button>'+
      '</div>';

    renderBills();

  }catch(e){
    statusEl.innerHTML = '<div class="notice n-red">Error reading bill: '+e.message+'</div>';
  }
}

function openBill(id){
  const b = bills.find(x=>x.id===id);
  if(!b) return;
  document.getElementById('bill-panel').innerHTML =
    '<div class="ph"><div><div class="preg">'+( b.supplier||'Bill')+'</div><div class="psub">Scanned: '+b.scannedAt+'</div></div>'+
    '<button class="xbtn" onclick="cx(\'ov-bill\')">✕</button></div>'+
    '<div class="pb">'+
      '<div class="grid2">'+
        '<div class="fg"><div class="flbl">Supplier</div><div style="font-weight:600">'+b.supplier+'</div></div>'+
        '<div class="fg"><div class="flbl">Invoice #</div><div style="font-family:monospace">'+( b.invoiceNum||'—')+'</div></div>'+
        '<div class="fg"><div class="flbl">Amount ex-VAT</div><div style="font-weight:700;color:var(--gold)">£'+b.amount+'</div></div>'+
        '<div class="fg"><div class="flbl">VAT</div><div>£'+(b.vat||'—')+'</div></div>'+
        '<div class="fg"><div class="flbl">Total inc-VAT</div><div style="font-weight:700">£'+(b.total||'—')+'</div></div>'+
        '<div class="fg"><div class="flbl">Payment Terms</div><div>'+(b.paymentTerms||'—')+'</div></div>'+
      '</div>'+

      (b.lineItems&&b.lineItems.length?
        '<div><div class="stitle">Line Items</div>'+
        '<table><thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead><tbody>'+
        b.lineItems.map(l=>'<tr><td>'+l.description+'</td><td>'+l.qty+'</td><td>£'+l.unitPrice+'</td><td>£'+l.lineTotal+'</td></tr>').join('')+
        '</tbody></table></div>':'')+

      '<div><div class="stitle">PO Match</div>'+
        '<div class="notice n-'+(b.matchStatus==='matched'?'green':b.matchStatus==='partial'?'amber':'red')+'">'+
          (b.matchedPO?'Matched to PO: '+b.matchedPO+' — '+b.matchReason:'No match found — '+b.matchReason)+
        '</div>'+
        '<div class="fg" style="margin-top:8px"><div class="flbl">Override — Link to PO # manually</div>'+
          '<div style="display:flex;gap:8px"><input class="fi" id="manual-po" placeholder="PO ID e.g. PO123456" value="'+(b.matchedPO||')'+'"/>'+
          '<button class="btn btn-gold" onclick="manualMatchBill(\''+b.id+'\')">Link</button></div>'+
        '</div>'+
      '</div>'+

      '<div style="display:flex;gap:8px">'+
        '<button class="btn btn-green" onclick="approveBill(\''+b.id+'\')">✓ Approve &amp; Mark Matched</button>'+
        '<button class="btn btn-red btn-sm" onclick="deleteBill(\''+b.id+'\')">Delete</button>'+
      '</div>'+
    '</div>';
  document.getElementById('ov-bill').classList.add('open');
}

function manualMatchBill(id){
  const b=bills.find(x=>x.id===id); if(!b)return;
  const po=document.getElementById('manual-po').value.trim();
  if(!po)return;
  b.matchedPO=po; b.matchStatus='matched'; b.matchReason='Manually linked by '+acctUser;
  saveBillsLocal(); renderBills();
  cx('ov-bill');
}
function approveBill(id){
  const b=bills.find(x=>x.id===id); if(!b)return;
  b.approved=true; b.approvedBy=acctUser; b.approvedAt=ts();
  b.matchStatus='matched';
  saveBillsLocal(); cx('ov-bill'); renderBills(); renderDash();
}
function deleteBill(id){
  if(!confirm('Delete this scanned bill?'))return;
  bills=bills.filter(x=>x.id!==id); saveBillsLocal(); cx('ov-bill'); renderBills();
}

// ── INVOICES ─────────────────────────────────────────────
function renderInvoices(){

    '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">'+
      '<div class="stitle">Invoices ('+invoices.length+')</div>'+
      '<button class="btn btn-gold btn-sm" onclick="document.getElementById(\'ov-invoice\').classList.add(\'open\')">+ New Invoice</button>'+
    '</div>'+
    (invoices.length?
      '<div class="card" style="padding:0;overflow:auto">'+
      '<table><thead><tr><th>Invoice #</th><th>Supplier</th><th>Date</th><th>Due</th><th>Net</th><th>VAT</th><th>Total</th><th>Linked PO</th><th>Status</th><th></th></tr></thead><tbody>'+
      invoices.map((inv,i)=>{
        const overdue = inv.due&&new Date(inv.due)<new Date()&&inv.status!=='paid';
        return '<tr style="'+(overdue?'background:var(--red-bg)':'')+'">'+
          '<td style="font-family:\'Courier New\',monospace;font-weight:700;color:var(--gold)">'+inv.num+'</td>'+
          '<td>'+inv.supplier+'</td>'+
          '<td style="font-size:12px;color:var(--dim)">'+( inv.date||'—')+'</td>'+
          '<td style="font-size:12px;color:'+(overdue?'var(--red)':'var(--dim)')+'">'+( inv.due||'—')+(overdue?' ⚠':'')+'</td>'+
          '<td style="font-family:\'Courier New\',monospace">£'+(+inv.net).toFixed(2)+'</td>'+
          '<td style="font-family:\'Courier New\',monospace;color:var(--dim)">£'+(+inv.vat).toFixed(2)+'</td>'+
          '<td style="font-family:\'Courier New\',monospace;font-weight:700">£'+(+inv.total||((+inv.net)+(+inv.vat))).toFixed(2)+'</td>'+
          '<td style="font-family:\'Courier New\',monospace;color:var(--gold);font-size:12px">'+(inv.po||'—')+'</td>'+
          '<td><span class="badge '+(inv.status==='paid'?'b-paid':'b-unpaid')+'">'+(inv.status||'Unpaid')+'</span></td>'+
          '<td style="display:flex;gap:4px">'+
            (inv.status!=='paid'?'<button class="btn btn-green btn-sm" onclick="markInvPaid('+i+')">Paid</button>':'')+
            '<button class="btn btn-ghost btn-sm" onclick="deleteInv('+i+')">✕</button>'+
          '</td>'+
        '</tr>';
      }).join('')+'</tbody></table></div>' :
      '<div class="notice n-blue">No invoices yet. Add your first invoice above.</div>'
    );
}

function calcTotal(){
  const net=+(document.getElementById('inv-net')?.value||0);
  const vat=+(document.getElementById('inv-vat')?.value||0);
  const total=document.getElementById('inv-total');
  if(total) total.value='£'+(net+vat).toFixed(2);
}
function saveInvoice(){
  const num=document.getElementById('inv-num').value.trim();
  const supplier=document.getElementById('inv-supplier').value.trim();
  if(!num||!supplier){alert('Invoice number and supplier are required.');return;}
  const inv={
    num,supplier,
    date:document.getElementById('inv-date').value,
    due:document.getElementById('inv-due').value,
    net:document.getElementById('inv-net').value||0,
    vat:document.getElementById('inv-vat').value||0,
    total:((+(document.getElementById('inv-net').value||0))+(+(document.getElementById('inv-vat').value||0))).toFixed(2),
    po:document.getElementById('inv-po').value.trim(),
    notes:document.getElementById('inv-notes').value.trim(),
    status:'unpaid',createdAt:ts(),createdBy:acctUser
  };
  invoices.unshift(inv);
  saveInvoicesLocal();
  cx('ov-invoice');
  renderInvoices();
}
function markInvPaid(i){
  invoices[i].status='paid'; invoices[i].paidAt=ts(); invoices[i].paidBy=acctUser;
  saveInvoicesLocal(); renderInvoices(); renderDash();
}
function deleteInv(i){
  if(!confirm('Delete this invoice?'))return;
  invoices.splice(i,1); saveInvoicesLocal(); renderInvoices();
}
